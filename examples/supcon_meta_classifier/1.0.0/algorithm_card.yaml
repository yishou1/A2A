algorithm_id: supcon_meta_classifier
version: 1.0.0
display_name: SupCon Meta Classifier
backend_type: python_http_service
status: draft

task_family: classification
modalities:
  input:
    - structured_json
  output:
    - structured_json

capabilities:
  - few_shot_classification
  - affiliation_labeling

agent_card:
  summary: >
    SupCon Meta Classifier from the TIA tactical intelligence agent pipeline.
  when_to_use:
    - Fused target embeddings need hostile/friendly labels.
  when_not_to_use:
    - No fused embeddings are available.
  input_description: >
    See input.schema.json for required structured fields.
  output_description: >
    See output.schema.json for structured outputs.

machine_spec:
  input_schema_ref: input.schema.json
  output_schema_ref: output.schema.json
  runtime:
    backend_type: python_http_service
    endpoint: http://127.0.0.1:9027/predict
    health_endpoint: http://127.0.0.1:9027/health
    metadata_endpoint: http://127.0.0.1:9027/metadata
    timeout_ms: 3000

constraints:
  max_input_chars: 20000000
  max_request_bytes: 33554432
  batch_supported: false
  streaming_supported: false

performance:
  latency_ms_p50: 50
  latency_ms_p95: 500
  primary_metric: classification_f1
  primary_score: 0.8

resource_requirements:
  min_cpu_cores: 2
  recommended_cpu_cores: 4
  min_memory_mb: 4096
  recommended_memory_mb: 8192
  min_gpu_count: 0
  gpu_type: optional
  min_vram_mb: 0
  recommended_vram_mb: 8192
  disk_mb: 4096

model_profile:
  parameter_count: 0
  parameter_count_text: varies_by_submodel
  flops: 0
  flops_text: varies_by_submodel
  precision: fp32

safety:
  risk_level: medium
  requires_human_review: true
