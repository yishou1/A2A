algorithm_id: decision_planning_core
version: 1.0.0
display_name: Decision Planning Core
backend_type: python_http_service
status: draft

task_family: planning
modalities:
  input:
    - structured_json
  output:
    - structured_json

capabilities:
  - candidate_plan_generation
  - logistic_plan_scoring
  - lstm_trend_scoring

agent_card:
  summary: >
    Non-RAG core algorithm for the A2A decision planning agent.
  when_to_use:
    - Candidate plans must be generated or ranked from structured tasks, resources, risks, and constraints.
  when_not_to_use:
    - Compliance, authorization, or RAG evidence retrieval is required.
  input_description: >
    A structured AgentRequest-like object containing scheduled_tasks and resources.
  output_description: >
    Candidate plans, recommended plan id, plan scores, target trends, and handoff notes.

machine_spec:
  input_schema_ref: input.schema.json
  output_schema_ref: output.schema.json
  runtime:
    backend_type: python_http_service
    endpoint: http://127.0.0.1:9020/predict
    health_endpoint: http://127.0.0.1:9020/health
    metadata_endpoint: http://127.0.0.1:9020/metadata
    timeout_ms: 5000

constraints:
  max_input_chars: 20000
  max_request_bytes: 1048576
  batch_supported: false
  streaming_supported: false

performance:
  latency_ms_p50: 30
  latency_ms_p95: 150
  primary_metric: candidate_plan_generation_success
  primary_score: 0.9

safety:
  risk_level: medium
  requires_human_review: true
