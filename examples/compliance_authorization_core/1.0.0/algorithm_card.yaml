algorithm_id: compliance_authorization_core
version: 1.0.0
display_name: Compliance Authorization Core
backend_type: python_http_service
status: draft

task_family: compliance
modalities:
  input:
    - structured_json
  output:
    - structured_json

capabilities:
  - rule_table_matching
  - authorization_checking
  - logistic_risk_calibration

agent_card:
  summary: >
    Non-RAG core algorithm for the A2A compliance and authorization agent.
  when_to_use:
    - Candidate plans must be checked against rule tables, authorization state, and constraints.
  when_not_to_use:
    - Candidate plans have not been generated yet or RAG evidence retrieval is required.
  input_description: >
    A structured AgentRequest-like object containing candidate_plans and authorization.
  output_description: >
    Compliance decision, authorization status, violations, risk probabilities, and review guidance.

machine_spec:
  input_schema_ref: input.schema.json
  output_schema_ref: output.schema.json
  runtime:
    backend_type: python_http_service
    endpoint: http://127.0.0.1:9021/predict
    health_endpoint: http://127.0.0.1:9021/health
    metadata_endpoint: http://127.0.0.1:9021/metadata
    timeout_ms: 5000

constraints:
  max_input_chars: 20000
  max_request_bytes: 1048576
  batch_supported: false
  streaming_supported: false

performance:
  latency_ms_p50: 30
  latency_ms_p95: 150
  primary_metric: compliance_decision_success
  primary_score: 0.9

safety:
  risk_level: high
  requires_human_review: true
