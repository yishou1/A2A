algorithm_id: trajectory_linear_predictor
version: 1.0.0
display_name: Trajectory Linear Predictor
backend_type: python_http_service
status: draft

task_family: forecasting
modalities:
  input:
    - structured_json
  output:
    - structured_json

capabilities:
  - trajectory_linear_predictor

agent_card:
  summary: >
    Trajectory Linear Predictor packaged for the A2A algorithm library.
  when_to_use:
    - Structured JSON inputs are available for this algorithm family.
  when_not_to_use:
    - Raw media or unstructured text without preprocessing.
  input_description: >
    See input.schema.json for required structured fields.
  output_description: >
    See output.schema.json for structured outputs.

machine_spec:
  input_schema_ref: input.schema.json
  output_schema_ref: output.schema.json
  runtime:
    backend_type: python_http_service
    endpoint: http://127.0.0.1:9011/predict
    health_endpoint: http://127.0.0.1:9011/health
    metadata_endpoint: http://127.0.0.1:9011/metadata
    timeout_ms: 3000

constraints:
  max_input_chars: 10000
  max_request_bytes: 1048576
  batch_supported: false
  streaming_supported: false

performance:
  latency_ms_p50: 20
  latency_ms_p95: 100
  primary_metric: trajectory_fit_mae
  primary_score: 0.9

safety:
  risk_level: low
  requires_human_review: true
