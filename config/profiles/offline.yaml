# 离线部署档：所有模型引用本地 models/pretrained 与 models/checkpoints
description: 内网/无外网环境；须先在有网机器运行 scripts/package_offline_models.py
target_device: 与 medium 档相同，模型全部本地化

inference:
  compute_profile: offline
  detection_model: models/checkpoints/battlefield_rtdetr.pt
  detection_imgsz: 640
  embed_dim: 1024
  mask2former_model: models/pretrained/mask2former-swin-tiny-ade-semantic
  semantic_comm_model: models/pretrained/flan-t5-small
  page_index_model: models/pretrained/paraphrase-MiniLM-L6-v2
  clip_fallback_model: models/pretrained/clip-vit-base-patch32
  odconv_checkpoint: models/checkpoints/odconv_refiner.pt
  edl_checkpoint: models/checkpoints/edl_head.pt
  motr_checkpoint: models/checkpoints/motr_tracker_battlefield.pt
  mamba_checkpoint: models/checkpoints/mamba_fusion.pt
  supcon_checkpoint: models/checkpoints/supcon_meta.pt
  marl_checkpoint: models/checkpoints/marl_policy.pt
  marl_ppo_checkpoint: models/checkpoints/marl_ppo_scheduler.pt
  confidence_threshold: 0.35
