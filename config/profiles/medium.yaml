# 中档 (M)：默认战场部署；RT-DETR-L @640 + embed 1024
description: 精度与速度平衡（推荐）
target_device: "12–16GB GPU（如 RTX 4060/4070）"

inference:
  detection_model: models/checkpoints/battlefield_rtdetr.pt
  detection_imgsz: 640
  embed_dim: 1024
  mask2former_model: facebook/mask2former-swin-tiny-ade-semantic
  semantic_comm_model: google/flan-t5-small
  page_index_model: paraphrase-MiniLM-L6-v2
  odconv_crop_size: 128
  odconv_checkpoint: models/checkpoints/odconv_refiner.pt
  edl_checkpoint: models/checkpoints/edl_head.pt
  motr_checkpoint: models/checkpoints/motr_tracker_battlefield.pt
  mamba_checkpoint: models/checkpoints/mamba_fusion.pt
  supcon_checkpoint: models/checkpoints/supcon_meta.pt
  marl_checkpoint: models/checkpoints/marl_policy.pt
  confidence_threshold: 0.35
